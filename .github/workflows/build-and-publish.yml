name: Build and Publish

# Pipeline 2: valida la aplicación, construye imágenes Docker y las publica en ACR.
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create image metadata
        id: meta
        # El SHA corto permite desplegar una versión específica además de latest.
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Test backend
        working-directory: backend
        # Esta prueba demuestra integración continua antes de publicar imágenes.
        run: python -m unittest discover -s tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Login to Azure Container Registry
        # ACR recibe las imágenes que luego usará Azure Container Instances.
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build backend image
        # Se publican dos tags: latest para despliegue simple y SHA para trazabilidad.
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-backend:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-backend:${{ steps.meta.outputs.sha_short }} \
            ./backend

      - name: Build frontend image
        # Sin build arg, el frontend usa el mismo host del navegador y el puerto 8000.
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-frontend:latest \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-frontend:${{ steps.meta.outputs.sha_short }} \
            ./frontend

      - name: Push backend image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-backend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-backend:${{ steps.meta.outputs.sha_short }}

      - name: Push frontend image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-frontend:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/azure-inventario-frontend:${{ steps.meta.outputs.sha_short }}

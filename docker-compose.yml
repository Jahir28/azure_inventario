services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: azure-inventario-backend
    environment:
      DATABASE_URL: sqlite:///./data/inventory.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: azure-inventario-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
